# Default instruction set with `ios:plist` omitted so flavorizr does not
# overwrite the hand-edited Info-local.plist / Info.plist files.
instructions:
  # Prepare
  - assets:download
  - assets:extract

  # Android
  - android:androidManifest
  - android:buildGradle
  - android:dummyAssets
  - android:icons

  # iOS (ios:plist intentionally omitted)
  - ios:xcconfig
  - ios:buildTargets
  - ios:schema
  - ios:dummyAssets
  - ios:icons
  - ios:launchScreen

  # Cleanup
  - assets:clean

flavors:
  local:
    app:
      name: "Flutter Lab Local"
    android:
      applicationId: "com.masahikokobayashi.flutterlab.local"
    ios:
      bundleId: "com.masahikokobayashi.flutterlab.local"
      buildSettings:
        INFOPLIST_FILE: "Runner/Info-local.plist"
  production:
    app:
      name: "Flutter Lab"
    android:
      applicationId: "com.masahikokobayashi.flutterlab"
    ios:
      bundleId: "com.masahikokobayashi.flutterlab"
